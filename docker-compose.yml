version: "3.8"

services:
  backend:
    build: ./backend       # builds Node.js backend
    ports:
      - "5000:5000"        # API available at localhost:5000

  frontend:
    image: nginx           # serves HTML/CSS/JS
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "3000:80"          # App available at localhost:3000